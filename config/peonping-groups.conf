# Peon-Ping menu groupings
# Maps a pack id (or a glob like tf2_*) to the group it appears under in the
# tray "Sound Pack" submenu. First matching line wins; group order = order of
# first appearance; unmatched packs fall under "Other" (shown last). If this
# file is missing, packs are listed flat with no group headers.

tf2_*            = Team Fortress 2

ccg_*            = Command & Conquer
ra2_*            = Command & Conquer
tiberian-sun-*   = Command & Conquer

sc_*             = StarCraft

caliph           = Stronghold Crusader
pig              = Stronghold Crusader
rat              = Stronghold Crusader
richard          = Stronghold Crusader
saladin          = Stronghold Crusader
snake            = Stronghold Crusader
sultan           = Stronghold Crusader
wolf             = Stronghold Crusader

peon             = Warcraft
peasant          = Warcraft

aoe2             = Games
